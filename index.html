<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小红书文章</title>
  <style>
    :root {
      --ink: #222222;
      --muted: #777777;
      --line: #ece5df;
      --orange: #f97316;
      --paper: #fffdfb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }
    main {
      width: min(100%, 1040px);
      margin: 0 auto;
      padding: 52px 20px 80px;
    }
    .mark {
      width: 72px;
      height: 3px;
      background: var(--orange);
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.15;
      font-weight: 760;
    }
    .intro {
      margin: 0 0 36px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
    }
    .article-list {
      display: grid;
      gap: 18px;
      margin-top: 28px;
    }
    a.card {
      display: grid;
      grid-template-columns: minmax(220px, 36%) 1fr;
      gap: 24px;
      align-items: center;
      padding: 18px;
      border: 1px solid var(--line);
      color: inherit;
      text-decoration: none;
      background: #ffffff;
    }
    a.card:hover {
      border-color: #f7c49e;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
    }
    h2 {
      margin: 0 0 10px;
      font-size: clamp(22px, 3vw, 32px);
      line-height: 1.25;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
    }
    @media (max-width: 760px) {
      main { padding: 34px 16px 56px; }
      a.card { grid-template-columns: 1fr; padding: 14px; gap: 16px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="mark"></div>
    <h1>小红书文章</h1>
    <p class="intro">用于发布文章与配图的静态站点。GitHub Pages 和 Cloudflare Pages 都可以直接从这个仓库构建。</p>

    <section class="article-list" aria-label="文章列表">
      <a class="card" href="jigou-xuanba/">
        <img src="jigou-xuanba/assets/00-cover-selection-logic.png" alt="信奥机构的底层逻辑，没人告诉你">
        <div>
          <h2>信奥机构的底层逻辑，没人告诉你</h2>
          <p>一篇关于培养、筛选、基础漏洞、时间资产和竞赛阶段门槛的信奥观察。</p>
        </div>
      </a>
    </section>
  </main>
</body>
</html>
